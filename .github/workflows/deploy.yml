name: Build and Deploy to AWS EC2

on:
  push:
    branches:
      - main

env:
  AWS_REGION: ap-southeast-2
  AWS_ACCOUNT_ID: 350480401466
  ECR_REPOSITORY: mock-server

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    permissions:
      id-token: write
      contents: read

    outputs:
      image: ${{ steps.image.outputs.image }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::350480401466:role/github-admin
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set image name
        id: image
        run: |
          IMAGE_URI=${{ env.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/${{ env.ECR_REPOSITORY }}
          echo "image=$IMAGE_URI:${{ github.sha }}" >> $GITHUB_OUTPUT

      - name: Build Docker image
        run: |
          docker build -t ${{ steps.image.outputs.image }} .
          docker tag ${{ steps.image.outputs.image }} ${{ env.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/${{ env.ECR_REPOSITORY }}:latest

      - name: Push to Amazon ECR
        run: |
          docker push ${{ steps.image.outputs.image }}
          docker push ${{ env.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/${{ env.ECR_REPOSITORY }}:latest

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e

            echo "Updating system..."
            sudo apt-get update -y

            echo "Installing Docker if not present..."
            if ! command -v docker &> /dev/null; then
              sudo apt install docker.io -y
            fi

            sudo systemctl start docker
            sudo systemctl enable docker

            echo "Installing AWS CLI if not present..."
            if ! command -v aws &> /dev/null; then
              sudo apt install awscli -y
            fi

            echo "Logging into ECR..."
            aws ecr get-login-password --region ap-southeast-2 | \
            sudo docker login --username AWS --password-stdin 350480401466.dkr.ecr.ap-southeast-2.amazonaws.com

            echo "Stopping old container..."
            sudo docker stop mock-server || true
            sudo docker rm mock-server || true

            echo "Pulling latest image..."
            sudo docker pull 350480401466.dkr.ecr.ap-southeast-2.amazonaws.com/mock-server:latest

            echo "Running new container..."
            sudo docker run -d \
              --name mock-server \
              -p 8080:8080 \
              --restart always \
              350480401466.dkr.ecr.ap-southeast-2.amazonaws.com/mock-server:latest

            echo "Deployment completed 🚀"